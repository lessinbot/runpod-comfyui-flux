name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BASE_IMAGE: docker.io/runpod/worker-comfyui:5.8.5-flux1-dev-fp8
  LORA_URL: https://huggingface.co/stablediffusionapi/load_lora_embeddings/resolve/main/NSFW-flux-lora.safetensors
  LORA_PATH: comfyui/models/loras/NSFW-flux-lora.safetensors
  # Push to both GHCR (private backup) and ttl.sh (public, for RunPod)
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  PUBLIC_IMAGE: ttl.sh/lessinbot-comfyui-flux-nsfw:365d

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install crane
        run: |
          VERSION=0.20.2
          curl -sL "https://github.com/google/go-containerregistry/releases/download/v${VERSION}/go-containerregistry_Linux_x86_64.tar.gz" | tar -xzf - crane
          chmod +x crane
          sudo mv crane /usr/local/bin/

      - name: Auth crane with GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Download LoRA and create layer
        run: |
          mkdir -p $(dirname ${{ env.LORA_PATH }})
          curl -sL -o ${{ env.LORA_PATH }} "${{ env.LORA_URL }}"
          ls -lh ${{ env.LORA_PATH }}
          tar -cf lora-layer.tar ${{ env.LORA_PATH }}
          ls -lh lora-layer.tar

      - name: Append LoRA layer and push to GHCR
        run: |
          crane append \
            --base ${{ env.BASE_IMAGE }} \
            --new_layer lora-layer.tar \
            --new_tag ${{ env.GHCR_IMAGE }}:latest
          crane tag ${{ env.GHCR_IMAGE }}:latest ${{ github.sha }}
          echo "Pushed to ${{ env.GHCR_IMAGE }}:latest"

      - name: Copy to public registry (ttl.sh) for RunPod
        run: |
          crane copy ${{ env.GHCR_IMAGE }}:latest ${{ env.PUBLIC_IMAGE }}
          echo "Pushed to ${{ env.PUBLIC_IMAGE }}"
